apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xappenvironments.platform.devopsidiot.io
spec:
  group: platform.devopsidiot.io
  names:
    kind: XAppEnvironment
    plural: xappenvironments
  # Cluster scoped because this XR composes a Namespace: Crossplane v2 refuses
  # to let a namespaced XR own cluster scoped resources. Claims are deprecated
  # in apiextensions.crossplane.io/v2, so the XR is applied directly.
  scope: Cluster
  versions:
    - name: v1alpha1
      referenceable: true
      schema:
        openAPIV3Schema:
          properties:
            spec:
              properties:
                appName:
                  description: Name of the application. Used to derive the namespace.
                  maxLength: 40
                  minLength: 1
                  pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                  type: string
                environment:
                  description: Environment tier, which selects the ResourceQuota.
                  enum:
                    - sandbox
                    - staging
                    - production
                  type: string
              required:
                - appName
                - environment
              type: object
              # Both fields feed the composed Namespace's name, and a Namespace
              # cannot be renamed. Without this, editing either one leaves the
              # old namespace in place while its quota and labels are updated
              # to the new tier: a namespace called foo-staging holding a
              # production quota. Reject the edit instead.
              x-kubernetes-validations:
                - message: appName is immutable; create a new XAppEnvironment instead
                  rule: self.appName == oldSelf.appName
                - message: environment is immutable; create a new XAppEnvironment instead
                  rule: self.environment == oldSelf.environment
            status:
              properties:
                namespace:
                  description: Namespace composed for this app environment.
                  type: string
                # Cached advisory policy verdict, keyed by a hash of the
                # policy-relevant spec fields so the model is only consulted
                # when they change. It lives in status because Crossplane
                # persists only the XR's status after the function pipeline;
                # annotations on the desired composite are silently dropped.
                policy:
                  description: Cached verdict of the advisory policy check.
                  properties:
                    compliant:
                      description: Whether the spec complied with every policy.
                      type: boolean
                    hash:
                      description: Hash of the spec fields the verdict was computed for.
                      type: string
                    violations:
                      description: The policies the spec broke, if any.
                      items:
                        type: string
                      type: array
                  type: object
              type: object
          type: object
      served: true
