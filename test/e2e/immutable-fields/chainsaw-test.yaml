apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: immutable-fields
spec:
  concurrent: false
  timeouts:
    apply: 1m
    assert: 5m
    delete: 2m
  steps:
    - name: create-the-xr
      try:
        - apply:
            file: xr.yaml
    - name: xr-becomes-ready
      try:
        - assert:
            resource:
              apiVersion: platform.devopsidiot.io/v1alpha1
              kind: XAppEnvironment
              metadata:
                name: e2e-immutable
              status:
                (conditions[?type == 'Ready'] | [0].status): "True"
    # Changing either field would rename the composed Namespace, which
    # Kubernetes cannot do. Before the XRD enforced this, the old namespace
    # survived while its quota was rewritten to the new tier.
    - name: rejects-changing-environment
      try:
        - apply:
            file: xr-changed-environment.yaml
            expect:
              - check:
                  ($error != null): true
    - name: rejects-changing-appname
      try:
        - apply:
            file: xr-changed-appname.yaml
            expect:
              - check:
                  ($error != null): true
    # The rejected edits must have left the original composition untouched:
    # still the sandbox tier, in the original namespace.
    - name: composition-is-unchanged
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: ResourceQuota
              metadata:
                name: compute-quota
                namespace: e2e-immutable-sandbox
              spec:
                hard:
                  limits.cpu: "2"
                  pods: "10"
        - assert:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-immutable-sandbox
                labels:
                  platform.devopsidiot.io/environment: sandbox
