apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: policy-compliant
spec:
  # The XR is cluster scoped, so it must not collide with other tests running
  # against the same cluster.
  concurrent: false
  timeouts:
    apply: 1m
    assert: 5m
    delete: 2m
  steps:
    - name: create-the-xr
      try:
        - apply:
            file: xr.yaml
    # A well-formed production app. The check runs against the real in-cluster
    # model, and the XR still reaches Ready: the advisory check never blocks.
    #
    # We assert only what does not depend on the model's sampled verdict - the
    # XR is Ready and Synced, and a PolicyCheck condition is published. We do
    # NOT assert a compliant verdict here: llama3.2:3b is small and over-flags,
    # so clearing a benign spec is not reproducible (it flagged this very XR
    # during development). The reliable direction - a small model readily flags
    # a clear breach - is asserted in the policy-violation scenario.
    - name: ready-and-check-runs
      try:
        - assert:
            resource:
              apiVersion: platform.devopsidiot.io/v1alpha1
              kind: XAppEnvironment
              metadata:
                name: billing-api
              status:
                (conditions[?type == 'Ready'] | [0].status): "True"
                (conditions[?type == 'Synced'] | [0].status): "True"
                (length(conditions[?type == 'PolicyCheck'])): 1
