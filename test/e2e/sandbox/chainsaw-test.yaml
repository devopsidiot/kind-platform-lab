apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: sandbox
spec:
  # The XR is cluster scoped, so it must not collide with other tests running
  # against the same cluster.
  concurrent: false
  timeouts:
    apply: 1m
    assert: 5m
    delete: 2m
  steps:
    - name: create-the-xr
      try:
        - apply:
            file: xr.yaml
    - name: xr-becomes-ready
      try:
        - assert:
            resource:
              apiVersion: platform.devopsidiot.io/v1alpha1
              kind: XAppEnvironment
              metadata:
                name: e2e-cart
              status:
                (conditions[?type == 'Ready'] | [0].status): "True"
                (conditions[?type == 'Synced'] | [0].status): "True"
    - name: composes-a-labelled-namespace
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-cart-sandbox
                labels:
                  platform.devopsidiot.io/app: e2e-cart
                  platform.devopsidiot.io/environment: sandbox
    - name: composes-the-sandbox-quota
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: ResourceQuota
              metadata:
                name: compute-quota
                namespace: e2e-cart-sandbox
              spec:
                hard:
                  limits.cpu: "2"
                  limits.memory: 4Gi
                  pods: "10"
                  requests.cpu: "1"
                  requests.memory: 2Gi
    - name: composes-the-configmap
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: e2e-cart-config
                namespace: e2e-cart-sandbox
              data:
                app: e2e-cart
                environment: sandbox
                tier.pods: "10"
